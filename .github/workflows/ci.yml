name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        # dev alone is not enough: the slow N=600 accelerator regressions in
        # tests/test_accelerated_two_orders.py importorskip numba, which lives
        # in the experiments extra -- without it they skip silently and this
        # workflow would not gate the coverage it claims to.
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev,experiments]"

      - name: Lint changed files
        run: python -m ruff check .

      - name: Test
        run: python -m pytest -q
